<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maturita 2026 — přehled prací</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0f1216;
    --panel: #171b22;
    --panel-2: #1f242d;
    --border: #2a313c;
    --text: #e6e8eb;
    --muted: #8a92a0;
    --accent: #4aa3ff;
    --accent-2: #6ee7a9;
    --warn: #ffb454;
    --err: #ff6b6b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  header {
    padding: 20px 28px; border-bottom: 1px solid var(--border);
    display: flex; flex-wrap: wrap; gap: 16px; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, #12161c, #0f1216);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .meta { color: var(--muted); font-size: 13px; }
  header nav a { margin-left: 14px; font-size: 13px; }
  main { padding: 24px 28px 80px; max-width: 1400px; margin: 0 auto; }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px; cursor: pointer; transition: transform .12s, border-color .12s;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card h2 { margin: 0 0 4px; font-size: 16px; }
  .card .title { color: var(--muted); font-size: 13px; margin-bottom: 14px; min-height: 36px; }
  .status-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-size: 11px; padding: 3px 8px; border-radius: 999px;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
    display: inline-flex; align-items: center; gap: 5px;
  }
  .chip.ok { color: var(--accent-2); border-color: rgba(110,231,169,.35); }
  .chip.miss { color: var(--err); border-color: rgba(255,107,107,.35); }
  .chip small { opacity: .7; font-size: 10px; }

  /* Detail */
  #detail { display: none; }
  #detail.open { display: block; }
  .back { font-size: 13px; color: var(--muted); cursor: pointer; display: inline-block; margin-bottom: 14px; }
  .back:hover { color: var(--text); }
  .detail-head h2 { margin: 0 0 4px; font-size: 22px; }
  .detail-head p { margin: 0 0 20px; color: var(--muted); }
  .tabs { display: flex; flex-wrap: wrap; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .tab {
    padding: 10px 16px; cursor: pointer; font-size: 13px; color: var(--muted);
    border-bottom: 2px solid transparent; user-select: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-left: 6px; background: var(--accent-2); }
  .tab.miss .dot { background: var(--err); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .viewer {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; margin-bottom: 16px;
  }
  .viewer-head {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center; justify-content: space-between; font-size: 13px;
    background: var(--panel-2);
  }
  .viewer-head .left { display: flex; gap: 10px; align-items: center; }
  .viewer-head .actions a { margin-left: 10px; font-size: 12px; }
  .viewer iframe, .viewer img { display: block; border: 0; width: 100%; background: #fff; }
  .viewer iframe { height: 80vh; }
  .viewer img { max-height: 90vh; object-fit: contain; background: #1a1f27; }
  .viewer .md { padding: 22px 28px; background: #fff; color: #222; max-height: 80vh; overflow: auto; }
  .viewer .md pre { background: #f4f4f4; padding: 10px; border-radius: 6px; overflow: auto; }
  .viewer .md code { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 13px; }
  .viewer .md table { border-collapse: collapse; }
  .viewer .md th, .viewer .md td { border: 1px solid #ddd; padding: 6px 10px; }
  .viewer .msg { padding: 40px; text-align: center; color: var(--muted); }
  .viewer .download-block { padding: 26px; }
  .viewer .download-block .fn { font-family: ui-monospace, Menlo, Consolas, monospace; color: var(--muted); font-size: 12px; word-break: break-all; }
  .btn {
    display: inline-block; padding: 8px 14px; border-radius: 8px;
    background: var(--accent); color: #001a33; font-weight: 600; font-size: 13px;
  }
  .btn.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  .btn:hover { text-decoration: none; filter: brightness(1.08); }
  .placeholder { padding: 40px; text-align: center; color: var(--muted); background: var(--panel); border: 1px dashed var(--border); border-radius: 10px; }
  .notice { background: rgba(74,163,255,.08); border: 1px solid rgba(74,163,255,.25); padding: 10px 14px; border-radius: 8px; color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .kind-badge { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); padding: 2px 6px; border: 1px solid var(--border); border-radius: 4px; }
</style>
</head>
<body>
<header>
  <div>
    <h1>🎓 Maturita 2026 — přehled prací</h1>
    <div class="meta">Gymnázium Havlíčkův Brod · Informatika · vedoucí Ing. Adam Ferencz · deadline 30. 4. 2026</div>
  </div>
  <nav>
    <a href="#/" data-nav>Přehled</a>
    <a href="README.md" target="_blank">Obecné zadání</a>
  </nav>
</header>

<main>
  <section id="overview">
    <div class="grid" id="grid"></div>
  </section>

  <section id="detail"></section>
</main>

<script>
const SECTIONS = [
  { key: "zadani",              label: "Zadání",             icon: "📄" },
  { key: "prezentace",          label: "Prezentace",          icon: "🎤" },
  { key: "paper",               label: "Článek",              icon: "📑" },
  { key: "poster",              label: "Poster",              icon: "🖼️" },
  { key: "dokumentace",         label: "Dokumentace",         icon: "📚" },
  { key: "projekt",             label: "Projekt",             icon: "💾" },
  { key: "readme",              label: "README",              icon: "📝" },
  { key: "hodnoceni_vedouciho", label: "Posudek vedoucího",   icon: "👨‍🏫" },
  { key: "hodnoceni_oponenta",  label: "Posudek oponenta",    icon: "🧑‍⚖️" },
];

let DATA = null;

async function load() {
  const res = await fetch("students.json");
  DATA = await res.json();
  renderGrid();
  route();
  window.addEventListener("hashchange", route);
}

function itemsFor(student, key) {
  if (key === "zadani")  return student.zadani ? [{ kind: "md", label: "Oficiální zadání", path: student.zadani }] : [];
  if (key === "readme")  return student.readme ? [{ kind: "md", label: "README odevzdání", path: student.readme }] : [];
  if (key === "hodnoceni_vedouciho" || key === "hodnoceni_oponenta") {
    const v = student[key];
    return v ? (Array.isArray(v) ? v : [v]) : [];
  }
  return Array.isArray(student[key]) ? student[key] : [];
}

function statusFor(student, key) {
  const items = itemsFor(student, key);
  if (items.length === 0) return "missing";
  return "ok";
}

function renderGrid() {
  const grid = document.getElementById("grid");
  const statusKeys = ["prezentace", "paper", "poster", "dokumentace"];
  grid.innerHTML = DATA.students.map(s => {
    const chips = statusKeys.map(k => {
      const items = itemsFor(s, k);
      const sec = SECTIONS.find(x => x.key === k);
      if (items.length === 0) {
        return `<span class="chip miss">${sec.icon} ${sec.label} <small>chybí</small></span>`;
      }
      const kinds = [...new Set(items.map(i => i.kind.toUpperCase()))].join("/");
      return `<span class="chip ok">${sec.icon} ${sec.label} <small>${kinds}</small></span>`;
    }).join("");
    return `
      <div class="card" onclick="location.hash='#/s/${s.id}'">
        <h2>${s.name}</h2>
        <div class="title">${s.title}</div>
        <div class="status-row">${chips}</div>
      </div>`;
  }).join("");
}

function route() {
  const h = location.hash || "#/";
  const m = h.match(/^#\/s\/([^\/]+)(?:\/([^\/]+))?/);
  const overview = document.getElementById("overview");
  const detail = document.getElementById("detail");
  if (!m) {
    overview.style.display = "";
    detail.classList.remove("open");
    detail.innerHTML = "";
    return;
  }
  const student = DATA.students.find(s => s.id === m[1]);
  if (!student) { location.hash = "#/"; return; }
  overview.style.display = "none";
  renderDetail(student, m[2] || "zadani");
}

function renderDetail(student, activeTab) {
  const detail = document.getElementById("detail");
  detail.classList.add("open");
  const tabsHtml = SECTIONS.map(sec => {
    const status = statusFor(student, sec.key);
    const cls = "tab" + (sec.key === activeTab ? " active" : "") + (status === "missing" ? " miss" : "");
    return `<div class="${cls}" onclick="location.hash='#/s/${student.id}/${sec.key}'">
      ${sec.icon} ${sec.label}<span class="dot"></span>
    </div>`;
  }).join("");

  detail.innerHTML = `
    <div class="back" onclick="location.hash='#/'">← Zpět na přehled</div>
    <div class="detail-head">
      <h2>${student.name}</h2>
      <p>${student.title}</p>
    </div>
    <div class="tabs">${tabsHtml}</div>
    <div id="tab-body"></div>
  `;

  const body = document.getElementById("tab-body");
  const items = itemsFor(student, activeTab);
  if (items.length === 0) {
    const sec = SECTIONS.find(s => s.key === activeTab);
    body.innerHTML = `<div class="placeholder">
      ${sec.icon} Tento student zatím neodevzdal: <b>${sec.label}</b>.
    </div>`;
    return;
  }
  body.innerHTML = items.map((it, i) => renderViewer(it, `${student.id}-${activeTab}-${i}`)).join("");
  items.forEach((it, i) => hydrateViewer(it, `${student.id}-${activeTab}-${i}`));
}

function renderViewer(it, id) {
  const dl = `<a class="btn secondary" href="${encodeURI(it.path)}" download>⬇ Stáhnout</a>`;
  const open = `<a class="btn" href="${encodeURI(it.path)}" target="_blank">↗ Otevřít v novém okně</a>`;
  const head = `
    <div class="viewer-head">
      <div class="left">
        <b>${it.label}</b>
        <span class="kind-badge">${it.kind}</span>
      </div>
      <div class="actions">${open} ${dl}</div>
    </div>`;

  let body = "";
  if (it.kind === "pdf") {
    body = `<iframe src="${encodeURI(it.path)}#view=FitH" title="${it.label}"></iframe>`;
  } else if (it.kind === "html") {
    body = `<iframe src="${encodeURI(it.path)}" title="${it.label}"></iframe>`;
  } else if (it.kind === "image") {
    body = `<img src="${encodeURI(it.path)}" alt="${it.label}">`;
  } else if (it.kind === "md") {
    body = `<div class="md" id="md-${id}"><div class="msg">Načítám…</div></div>`;
  } else if (it.kind === "download") {
    body = `<div class="download-block">
      <p>Tento soubor není možné zobrazit přímo v prohlížeči.</p>
      <p class="fn">${it.path}</p>
      ${open} ${dl}
    </div>`;
  } else {
    body = `<div class="msg">Neznámý typ: ${it.kind}</div>`;
  }
  return `<div class="viewer">${head}${body}</div>`;
}

async function hydrateViewer(it, id) {
  if (it.kind !== "md") return;
  const el = document.getElementById("md-" + id);
  if (!el) return;
  try {
    const r = await fetch(encodeURI(it.path));
    if (!r.ok) throw new Error("HTTP " + r.status);
    const text = await r.text();
    el.innerHTML = marked.parse(text);
  } catch (e) {
    el.innerHTML = `<div class="msg">
      Nelze načíst markdown (${e.message}).<br>
      Pravděpodobně stránku spouštíš přes <code>file://</code> — prohlížeče blokují <code>fetch()</code> na lokální soubory.<br><br>
      <b>Spusť lokální server v kořeni projektu:</b><br>
      <code>python -m http.server 8000</code><br>
      a otevři <a href="http://localhost:8000/">http://localhost:8000/</a>
    </div>`;
  }
}

load();
</script>
</body>
</html>
